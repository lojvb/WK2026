<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>WK 2026 Pronostiek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E1B2A; --paper:#EEF1F5; --card:#FFFFFF;
    --accent:#FF4D1F; --accent-dim:#FFE5DC;
    --text:#15212E; --muted:#6A7785; --line:#E2E7ED;
    --gold:#E8B53A; --silver:#AEB6C0; --bronze:#C9874A;
    --p0:#C0392B; --p1:#E15759; --p2:#F28E2B; --p3:#F4B942;
    --p4:#F2D45C; --p5:#C7D957; --p6:#8FCB5C; --p7:#3FAE54;
    --disp:'Anton','Arial Narrow',Impact,sans-serif;
    --body:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--body);background:var(--paper);color:var(--text);
    line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:84px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* ---- top bar ---- */
  header.app{position:sticky;top:0;z-index:30;background:var(--ink);color:#fff;
    padding:14px 18px calc(14px) 18px;padding-top:max(14px,env(safe-area-inset-top))}
  .brand{display:flex;align-items:center;justify-content:space-between}
  .brand h1{font-family:var(--disp);font-weight:400;font-size:26px;letter-spacing:.5px;
    margin:0;line-height:.9;text-transform:uppercase}
  .brand h1 .yr{color:var(--accent)}
  .brand .sub{font-size:11px;color:#9FB0C2;text-transform:uppercase;letter-spacing:2px;margin-top:4px}
  .admin-badge{font-size:11px;font-weight:700;background:var(--accent);color:#fff;
    padding:4px 10px;border-radius:99px;letter-spacing:.5px;cursor:pointer;white-space:nowrap}
  .admin-badge.out{background:#1E3047;color:#9FB0C2}
  .progress{margin-top:10px;height:6px;background:#1E3047;border-radius:99px;overflow:hidden}
  .progress>i{display:block;height:100%;background:var(--accent);border-radius:99px;
    transition:width .5s ease}
  .progress-lbl{font-size:11px;color:#9FB0C2;margin-top:6px;letter-spacing:.3px}

  /* sync indicator */
  .sync{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#9FB0C2;margin-top:4px}
  .sync .dot{width:6px;height:6px;border-radius:50%;background:#3FAE54}
  .sync .dot.syncing{background:#F4B942;animation:pulse .8s infinite}
  .sync .dot.err{background:#C0392B}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  main{max-width:680px;margin:0 auto;padding:16px 14px 24px}
  .eyebrow{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:4px 2px 12px}

  /* ---- standings ---- */
  .board{background:var(--card);border-radius:16px;overflow:hidden;
    box-shadow:0 1px 3px rgba(14,27,42,.06),0 8px 24px rgba(14,27,42,.05)}
  .row{display:grid;grid-template-columns:46px 1fr auto;align-items:center;
    gap:8px;padding:11px 14px;border-bottom:1px solid var(--line);position:relative}
  .row:last-child{border-bottom:0}
  .rank{font-family:var(--disp);font-size:26px;line-height:1;color:var(--muted);
    text-align:center;font-weight:400}
  .r1 .rank{color:var(--gold)} .r2 .rank{color:var(--silver)} .r3 .rank{color:var(--bronze)}
  .who{min-width:0}
  .who .nm{font-weight:700;font-size:16px;display:flex;align-items:center;gap:7px}
  .who .bar{height:5px;background:var(--line);border-radius:99px;margin-top:6px;overflow:hidden}
  .who .bar>i{display:block;height:100%;background:var(--ink);border-radius:99px;transition:width .6s}
  .r1 .bar>i{background:var(--accent)}
  .pts{font-family:var(--disp);font-size:28px;line-height:1;font-weight:400;letter-spacing:.5px}
  .pts small{font-family:var(--body);font-size:10px;font-weight:700;color:var(--muted);
    display:block;text-align:right;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
  .crown{font-size:13px}
  .leader-pill{position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent)}

  /* money rule */
  .pot{background:var(--card);border-radius:16px;padding:16px;margin-top:16px;
    box-shadow:0 1px 3px rgba(14,27,42,.06)}
  .pot h3{margin:0 0 4px;font-size:15px}
  .pot p{margin:0 0 12px;color:var(--muted);font-size:13px}
  .pot .inrow{display:flex;gap:10px;align-items:center}
  .pot input{flex:0 0 130px;font:inherit;font-weight:700;padding:10px 12px;border:1.5px solid var(--line);
    border-radius:10px;font-size:16px}
  .pot input:focus{outline:none;border-color:var(--accent)}
  .pot .share{margin-top:12px;font-size:13px;color:var(--text)}
  .pot .share div{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed var(--line)}
  .pot .share div:last-child{border-bottom:0}
  .pot .share b{font-variant-numeric:tabular-nums}

  /* ---- matches ---- */
  .roundhdr{display:flex;align-items:center;gap:10px;margin:22px 4px 10px;cursor:pointer;
    background:var(--card);padding:12px 14px;border-radius:14px;
    box-shadow:0 1px 2px rgba(14,27,42,.05);user-select:none}
  .roundhdr:first-child{margin-top:6px}
  .roundhdr h2{font-family:var(--disp);font-weight:400;font-size:18px;text-transform:uppercase;
    letter-spacing:.5px;margin:0}
  .roundhdr .ml{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-dim);
    padding:2px 8px;border-radius:99px;letter-spacing:.5px}
  .roundhdr .rcount{margin-left:auto;font-size:12px;font-weight:600;color:var(--muted);
    display:flex;align-items:center;gap:8px}
  .roundhdr .rchev{font-size:12px;color:var(--muted);transition:transform .2s}
  .roundhdr.ropen .rchev{transform:rotate(180deg)}
  .roundbox{display:none}
  .roundbox.ropen{display:block;margin-bottom:6px}
  .mcard{background:var(--card);border-radius:14px;margin-bottom:9px;overflow:hidden;
    box-shadow:0 1px 2px rgba(14,27,42,.05)}
  .mhead{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;
    padding:13px 14px;cursor:pointer}
  .mteams{min-width:0}
  .mteams .tn{font-weight:700;font-size:15px;line-height:1.25}
  .mteams .badges{margin-top:5px;display:flex;gap:6px;flex-wrap:wrap}
  .bdg{font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:99px;
    text-transform:uppercase}
  .bdg.bel{background:#FEE; color:#C0392B}
  .bdg.mlt{background:#EEF1F5;color:var(--muted)}
  .bdg.open{background:#FFF4E5;color:#B5730B}
  .bdg.done{background:#E6F6EC;color:#1F8E48}
  .score-display{font-family:var(--disp);font-size:22px;color:var(--ink);letter-spacing:1px;min-width:60px;text-align:center}
  .score-display.empty{color:var(--muted);font-size:16px}
  .score-edit{display:flex;align-items:center;gap:4px}
  .score-edit input{width:38px;height:40px;text-align:center;font-family:var(--disp);font-size:22px;
    border:1.5px solid var(--line);border-radius:9px;padding:0;color:var(--ink);background:#fff}
  .score-edit input:focus{outline:none;border-color:var(--accent)}
  .score-edit .dash{font-family:var(--disp);font-size:20px;color:var(--muted)}
  .mhead .chev{font-size:13px;color:var(--muted);transition:transform .2s;margin-left:2px}
  .mcard.open .chev{transform:rotate(180deg)}
  .preds{display:none;padding:4px 12px 14px;border-top:1px solid var(--line)}
  .mcard.open .preds{display:block}
  .pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:10px}
  @media(min-width:520px){.pgrid{grid-template-columns:repeat(3,1fr)}}
  .ptile{border-radius:10px;padding:8px 10px;display:flex;justify-content:space-between;
    align-items:center;gap:6px}
  .ptile .pn{font-size:13px;font-weight:600;opacity:.95;min-width:0;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap}
  .ptile .ps{font-family:var(--disp);font-size:18px;letter-spacing:.5px;display:flex;
    align-items:baseline;gap:5px}
  .ptile .ps .pt{font-family:var(--body);font-size:11px;font-weight:700;opacity:.85}
  .nores{color:var(--muted);font-size:13px;padding:8px 2px 2px;font-style:italic}

  /* add match */
  .addbtn{width:100%;margin-top:14px;background:none;border:1.5px dashed var(--line);
    color:var(--muted);font:inherit;font-weight:700;padding:13px;border-radius:14px;cursor:pointer}
  .addbtn:hover{border-color:var(--accent);color:var(--accent)}

  /* ---- players ---- */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .chip{font:inherit;font-weight:600;font-size:14px;padding:9px 14px;border-radius:99px;
    border:1.5px solid var(--line);background:var(--card);cursor:pointer;color:var(--text)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .pstat{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .stat{background:var(--card);border-radius:14px;padding:14px;box-shadow:0 1px 2px rgba(14,27,42,.05)}
  .stat .v{font-family:var(--disp);font-size:34px;line-height:.9;color:var(--ink)}
  .stat .v.acc{color:var(--accent)}
  .stat .k{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin-top:6px}
  .plist{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(14,27,42,.05)}
  .pli{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;
    padding:10px 14px;border-bottom:1px solid var(--line)}
  .pli:last-child{border-bottom:0}
  .pli .mn{font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pli .sc{font-weight:700;font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
  .pli .pp{min-width:30px;text-align:center;font-family:var(--disp);font-size:16px;border-radius:7px;
    padding:2px 0}

  /* ---- rules ---- */
  .panel{background:var(--card);border-radius:16px;padding:18px;margin-bottom:14px;
    box-shadow:0 1px 2px rgba(14,27,42,.05)}
  .panel h3{margin:0 0 12px;font-size:16px}
  .rule{display:flex;gap:12px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line)}
  .rule:last-child{border-bottom:0}
  .swatch{flex:0 0 16px;height:16px;border-radius:5px;margin-top:3px}
  .rule .rt{font-size:14px}
  .rule .rt b{font-weight:700}
  .rule .rp{font-family:var(--disp);font-size:20px;color:var(--ink);flex:0 0 auto;margin-left:auto}
  .mults{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .mults div{background:var(--paper);border-radius:9px;padding:9px 11px;font-size:13px;font-weight:600}
  .mults b{color:var(--accent)}
  .legend{display:flex;flex-wrap:wrap;gap:6px}
  .legend span{font-family:var(--disp);font-size:14px;width:34px;height:30px;border-radius:7px;
    display:flex;align-items:center;justify-content:center}
  .toolbtn{font:inherit;font-weight:700;font-size:14px;padding:11px 14px;border-radius:11px;
    border:1.5px solid var(--line);background:var(--card);cursor:pointer;color:var(--text)}
  .toolbtn.danger{color:#C0392B;border-color:#F2C6C0}
  .toolrow{display:flex;gap:9px;flex-wrap:wrap}

  /* ---- tabbar ---- */
  nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:40;background:#fff;
    border-top:1px solid var(--line);display:flex;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
  nav.tabs button{flex:1;background:none;border:0;font:inherit;cursor:pointer;color:var(--muted);
    font-size:11px;font-weight:700;letter-spacing:.4px;padding:5px 2px;display:flex;flex-direction:column;
    align-items:center;gap:3px}
  nav.tabs button .ic{font-size:18px;line-height:1}
  nav.tabs button.on{color:var(--accent)}

  /* modal */
  .modal{position:fixed;inset:0;z-index:60;background:rgba(14,27,42,.45);display:none;
    align-items:flex-end;justify-content:center}
  .modal.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:680px;max-height:92vh;overflow:auto;
    border-radius:20px 20px 0 0;padding:20px 18px calc(24px + env(safe-area-inset-bottom))}
  .sheet h3{margin:0 0 14px;font-family:var(--disp);font-weight:400;font-size:20px;text-transform:uppercase}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);
    text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .field input,.field select{width:100%;font:inherit;font-size:15px;padding:11px 12px;
    border:1.5px solid var(--line);border-radius:10px;background:#fff}
  .field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
  .predform{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin-bottom:7px}
  .predform .pn{font-size:14px;font-weight:600}
  .mini{display:flex;gap:4px;align-items:center}
  .mini input{width:42px;text-align:center;font-weight:700}
  .mini .dash{color:var(--muted);font-weight:700}
  .sheet .actions{display:flex;gap:10px;margin-top:8px}
  .sheet .actions button{flex:1;font:inherit;font-weight:700;font-size:15px;padding:13px;
    border-radius:12px;cursor:pointer;border:0}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-ghost{background:var(--paper);color:var(--text)}

  /* login sheet */
  .login-sheet{background:#fff;width:100%;max-width:400px;border-radius:20px;
    padding:28px 24px;margin:auto}
  .login-sheet h3{margin:0 0 6px;font-family:var(--disp);font-size:22px;font-weight:400;text-transform:uppercase}
  .login-sheet p{margin:0 0 18px;font-size:13px;color:var(--muted)}
  .modal.login-modal{align-items:center}

  /* setup banner */
  .setup-banner{background:#FFF4E5;border:1.5px solid #F4B942;border-radius:14px;
    padding:16px;margin-bottom:16px;font-size:13px;line-height:1.6}
  .setup-banner strong{display:block;margin-bottom:6px;font-size:14px}
  .setup-banner code{background:#fff;border:1px solid var(--line);padding:2px 6px;
    border-radius:5px;font-family:monospace;font-size:12px;word-break:break-all}

  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:99px;font-size:13px;font-weight:600;
    opacity:0;transition:.25s;z-index:70;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.2)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* loading */
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:200px;gap:14px;color:var(--muted);font-size:14px}
  .spinner{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header class="app">
  <div class="brand">
    <div>
      <h1>Pronostiek <span class="yr">WK&nbsp;2026</span></h1>
      <div class="sub">Vriendenpoule · 12 spelers</div>
    </div>
    <button class="admin-badge out" id="adminBtn">⚙️ Admin</button>
  </div>
  <div class="progress"><i id="progBar"></i></div>
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div class="progress-lbl" id="progLbl"></div>
    <div class="sync"><span class="dot" id="syncDot"></span><span id="syncLbl">Verbonden</span></div>
  </div>
</header>

<main id="view"><div class="loading"><div class="spinner"></div>Laden…</div></main>

<nav class="tabs" id="tabs">
  <button data-tab="stand" class="on"><span class="ic">🏆</span>Stand</button>
  <button data-tab="matches"><span class="ic">⚽</span>Wedstrijden</button>
  <button data-tab="players"><span class="ic">👤</span>Spelers</button>
  <button data-tab="rules"><span class="ic">📋</span>Regels</button>
</nav>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="modal login-modal" id="loginModal">
  <div class="login-sheet">
    <h3>Admin Login</h3>
    <p>Vul het beheerderswachtwoord in om uitslagen te bewerken.</p>
    <div class="field">
      <label>Wachtwoord</label>
      <input type="password" id="pwInput" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div id="loginErr" style="color:#C0392B;font-size:13px;margin-bottom:10px;display:none">Fout wachtwoord.</div>
    <div class="actions">
      <button class="btn-ghost" id="cancelLogin">Annuleer</button>
      <button class="btn-primary" id="doLogin">Inloggen</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

let db = null;
let fbReady = false;
const isConfigured = FIREBASE_CONFIG.apiKey !== "JOUW_API_KEY";

if (isConfigured) {
  try {
    const app = initializeApp(FIREBASE_CONFIG);
    db = getDatabase(app);
    fbReady = true;
  } catch(e) {
    console.error("Firebase init fout:", e);
  }
}

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let state = { results:{}, knockouts:[], pot:0 };
let isAdmin = false;
let ui = { tab:'stand', open:{}, roundOpen:{}, player:0 };
let syncStatus = 'ok'; // ok | syncing | err

function setSyncStatus(s) {
  syncStatus = s;
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLbl');
  if (!dot) return;
  dot.className = 'dot' + (s === 'ok' ? '' : s === 'syncing' ? ' syncing' : ' err');
  lbl.textContent = s === 'ok' ? 'Verbonden' : s === 'syncing' ? 'Opslaan…' : 'Offline';
}

// ══════════════════════════════════════════════
//  FIREBASE READ / WRITE
// ══════════════════════════════════════════════
async function loadFromFirebase() {
  if (!fbReady) return;
  try {
    const snap = await get(ref(db, 'state'));
    if (snap.exists()) state = Object.assign(state, snap.val());
    // live listener for all viewers
    onValue(ref(db, 'state'), snap => {
      if (snap.exists()) {
        state = Object.assign({}, { results:{}, knockouts:[], pot:0 }, snap.val());
        render();
      }
    });
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('err');
  }
}

let saveTimer;
function saveToFirebase() {
  if (!fbReady || !isAdmin) return;
  setSyncStatus('syncing');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await set(ref(db, 'state'), state);
      setSyncStatus('ok');
    } catch(e) {
      setSyncStatus('err');
      toast('Fout bij opslaan — controleer je verbinding');
    }
  }, 400);
}

// ══════════════════════════════════════════════
//  SCORING
// ══════════════════════════════════════════════
function parse(s){
  if(!s) return null; s=(''+s).trim();
  const m = s.match(/^(\d+)\s*-\s*(\d+)$/); if(!m) return null;
  return [parseInt(m[1]), parseInt(m[2])];
}
const sign = n => n>0?1:(n<0?-1:0);
function rawPoints(pred,res){
  const p=parse(pred), r=parse(res);
  if(!p||!r) return null;
  const [ph,pa]=p,[rh,ra]=r; let s=0;
  if(sign(ph-pa)===sign(rh-ra)) s+=2;
  if(ph===rh) s+=1;
  if(pa===ra) s+=1;
  if((ph-pa)===(rh-ra)) s+=1;
  if(ph===rh&&pa===ra) s+=2;
  return s;
}
function gradeColor(p){ return getComputedStyle(document.documentElement).getPropertyValue('--p'+p).trim(); }
function gradeText(p){ return (p===0||p===1||p===7)?'#fff':'#15212E'; }

function allMatches(){
  const base = DATA.matches.map(m=>({
    id:m.id, round:m.round, name:m.name, belgian:m.belgian,
    mult:m.mult, preds:m.preds,
    result: state.results[m.id] !== undefined ? state.results[m.id] : m.result,
  }));
  const kos = (state.knockouts||[]).map((m,i)=>({
    id:'k'+i, round:m.round, name:m.name, belgian:/belg/i.test(m.name),
    mult:(ROUND_DEFS.find(r=>r.key===m.round)||{mult:1}).mult,
    preds:m.preds,
    result: state.results['k'+i] !== undefined ? state.results['k'+i] : (m.result||''),
  }));
  return base.concat(kos);
}
function matchPointsForPlayer(m,pi){
  const raw = rawPoints(m.preds[pi], m.result);
  if(raw===null) return null;
  const factor = m.mult * (m.belgian?2:1);
  return { raw, total: raw*factor, factor };
}
function standings(){
  const ms = allMatches();
  return DATA.players.map((nm,pi)=>{
    let pts=0, scored=0, bull=0;
    ms.forEach(m=>{ const r=matchPointsForPlayer(m,pi);
      if(r!==null){ pts+=r.total; scored++; if(r.raw===7) bull++; }});
    return {pi, nm, pts, scored, bull};
  }).sort((a,b)=> b.pts-a.pts || b.bull-a.bull || a.nm.localeCompare(b.nm));
}

  if(bar) bar.style.width = (ms.length? done/ms.length*100:0)+'%';
  if(lbl) lbl.textContent = `${done} van ${ms.length} uitslagen ingevuld`;

function renderStand(){
  const S = standings();
  const max = Math.max(1, ...S.map(s=>s.pts));
  const totalPts = S.reduce((a,s)=>a+s.pts,0);
  let h = '';
  if(!isConfigured) h += renderSetupBanner();
  h += `<div class="eyebrow">Klassement</div><div class="board">`;
  S.forEach((s,i)=>{
    const place=i+1;
    h+=`<div class="row r${place}">
      ${place===1?'<span class="leader-pill"></span>':''}
      <div class="rank">${place}</div>
      <div class="who">
        <div class="nm">${s.nm}${place===1?' <span class="crown">👑</span>':''}</div>
        <div class="bar"><i style="width:${s.pts/max*100}%"></i></div>
      </div>
      <div class="pts">${fmt(s.pts)}<small>punten</small></div>
    </div>`;
  });
  h+=`</div>`;
  h+=`<div class="pot">
    <h3>Verdeel de pot</h3>
    <p>Iedereen krijgt een deel naar verhouding van zijn punten.</p>
    <div class="inrow">
      <input id="potInput" type="number" min="0" step="1" inputmode="decimal"
        placeholder="€ 0" value="${state.pot||''}" ${!isAdmin?'readonly':''}
        style="${!isAdmin?'opacity:.6;cursor:not-allowed;':''}" >
      <span style="color:var(--muted);font-size:13px">totale pot (€)</span>
    </div>`;
  if(state.pot>0 && totalPts>0){
    h+=`<div class="share">`+
      S.map(s=>`<div><span>${s.nm}</span><b>€ ${ (state.pot*s.pts/totalPts).toFixed(2) }</b></div>`).join('')+
      `</div>`;
  }
  h+=`</div>`;
  $('#view').innerHTML=h;
  const pin=$('#potInput');
  if(pin && isAdmin) pin.addEventListener('input',e=>{
    state.pot=parseFloat(e.target.value)||0;
    saveToFirebase();
    clearTimeout(window._potT); window._potT=setTimeout(renderStand,600);
  });
}

    h+=`<div class="roundhdr ${isRoundOpen?'ropen':''}" data-round="${rd.key}">

      h+=`<div class="mcard ${isOpen?'open':''}" data-card="${m.id}">

          <div class="mteams">
            <div class="tn">${m.name||'—'}</div>

              ${m.belgian?'<span class="bdg bel">🇧🇪 ×2</span>':''}
              <span class="bdg ${mdone?'done':'open'}">${mdone?'Uitslag ✓':'Nog niet gespeeld'}</span>

          </div>
          ${scoreWidget(m)}
        </div>
        <div class="preds">${predsHTML(m)}</div>
      </div>`;
    });

function predsHTML(m){
  if(!parse(m.result)){
    return `<div class="nores">Vul de uitslag in om de punten te zien.</div>
    <div class="pgrid">`+DATA.players.map((nm,pi)=>{
      const pv=m.preds[pi]||'—';
      return `<div class="ptile" style="background:var(--paper)">
        <span class="pn">${nm}</span><span class="ps">${pv}</span></div>`;}).join('')+`</div>`;
  }
  return `<div class="pgrid">`+DATA.players.map((nm,pi)=>{
    const r=matchPointsForPlayer(m,pi);
    const raw=r?r.raw:0;
    const bg=gradeColor(raw), tc=gradeText(raw);
    const ptlbl = r? (Number.isInteger(r.total)?r.total:fmt(r.total)) : 0;
    return `<div class="ptile" style="background:${bg};color:${tc}">
      <span class="pn">${nm}</span>
      <span class="ps">${m.preds[pi]||'—'} <span class="pt">${ptlbl}p</span></span>
    </div>`;
  }).join('')+`</div>`;
}

function renderPlayers(){
  const pi=ui.player;
  const ms=allMatches();
  let pts=0,scored=0,bull=0, rows='';
  ms.forEach(m=>{

    if(r===null) return;
    pts+=r.total; scored++; if(r.raw===7)bull++;
    rows+=`<div class="pli">
      <span class="mn">${m.name}</span>
      <span class="sc">${m.preds[pi]||'–'} · <em style="font-style:normal;color:var(--ink)">${m.result}</em></span>
      <span class="pp" style="background:${gradeColor(r.raw)};color:${gradeText(r.raw)}">${Number.isInteger(r.total)?r.total:fmt(r.total)}</span>
    </div>`;
  });
  const S=standings(); const place=S.findIndex(s=>s.pi===pi)+1;
  let h=`<div class="eyebrow">Per speler</div>
    <div class="chips">`+DATA.players.map((nm,i)=>
      `<button class="chip ${i===pi?'on':''}" data-pl="${i}">${nm}</button>`).join('')+`</div>

function renderRules(){
  let h=`<div class="eyebrow">Hoe scoren we?</div>
  <div class="panel"><h3>Puntensysteem</h3>`;
  RULES.forEach(r=>{
    h+=`<div class="rule"><div class="swatch" style="background:${r.c}"></div>
      <div class="rt"><b>${r.t}</b><br><span style="color:var(--muted);font-size:12.5px">${r.d}</span></div>
      <div class="rp">${r.p}</div></div>`;
  });
  h+=`</div>
  <div class="panel"><h3>Vermenigvuldigers per ronde</h3>
    <div class="mults">
      <div>Groepsfase <b>×1</b></div><div>16de finale <b>×1,5</b></div>
      <div>8ste finale <b>×2</b></div><div>Kwartfinale <b>×2,5</b></div>
      <div>Halve finale <b>×3</b></div><div>Finale <b>×4</b></div>
      <div style="grid-column:1/-1">Belgische wedstrijden <b>×2</b> (bovenop de ronde)</div>
    </div></div>
  <div class="panel"><h3>Kleurcode = behaalde punten</h3>
    <div class="legend">`+[0,1,2,3,4,5,6,7].map(p=>
      `<span style="background:${gradeColor(p)};color:${gradeText(p)}">${p}</span>`).join('')+`</div>
    <p style="color:var(--muted);font-size:12.5px;margin:10px 0 0">Rood = mis · groen = raak · fel groen = perfect.</p>
  </div>
  ${isAdmin ? `<div class="panel"><h3>Admin tools</h3>
    <div class="toolrow">
      <button class="toolbtn danger" id="resetBtn">Uitslagen wissen</button>
    </div></div>` : ''}`;
  $('#view').innerHTML=h;
}

function render(){
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab===ui.tab));
  renderProgress();
  renderAdminBtn();
  if(ui.tab==='stand') renderStand();
  else if(ui.tab==='matches') renderMatches();
  else if(ui.tab==='players') renderPlayers();
  else renderRules();
}

// ══════════════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════════════
let toastT;
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1800); }

function setResult(mid){
  if(!isAdmin) return;
  const card=document.querySelector(`.score-edit[data-mid="${mid}"]`);
  if(!card) return;
  const h=card.querySelector('.sh').value, a=card.querySelector('.sa').value;
  if(h!==''&&a!=='') state.results[mid]=`${parseInt(h)}-${parseInt(a)}`;
  else delete state.results[mid];
  saveToFirebase();
  renderProgress();
  const m=allMatches().find(x=>''+x.id===''+mid);
  const cardEl=document.querySelector(`.mcard[data-card="${mid}"]`);
  if(cardEl && m){
    cardEl.querySelector('.preds').innerHTML=predsHTML(m);
    const done=!!parse(m.result);
    const b=cardEl.querySelector('.bdg.open,.bdg.done');
    if(b){ b.className='bdg '+(done?'done':'open'); b.textContent=done?'Uitslag ✓':'Nog niet gespeeld'; }
  }
}

document.getElementById('tabs').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return; ui.tab=b.dataset.tab; render();
});

document.getElementById('view').addEventListener('click',e=>{
  const rh=e.target.closest('[data-round]');
  if(rh){
    const k=rh.dataset.round; ui.roundOpen[k]=!ui.roundOpen[k];
    rh.classList.toggle('ropen',ui.roundOpen[k]);
    const box=document.querySelector(`[data-roundbox="${CSS.escape(k)}"]`);
    if(box) box.classList.toggle('ropen',ui.roundOpen[k]);
    return;
  }
  const tog=e.target.closest('[data-toggle]');
  if(tog && !e.target.closest('.score-edit')){
    const id=tog.dataset.toggle; ui.open[id]=!ui.open[id];
    tog.closest('.mcard').classList.toggle('open',ui.open[id]); return;
  }
  const pl=e.target.closest('[data-pl]');
  if(pl){ ui.player=+pl.dataset.pl; renderPlayers(); return; }
  if(e.target.id==='addMatch'){ openAddMatch(); return; }
  if(e.target.id==='resetBtn'){ openReset(); return; }
});

document.getElementById('view').addEventListener('input',e=>{
  if(e.target.closest('.score-edit')){
    const mid=e.target.closest('.score-edit').dataset.mid; setResult(mid);
  }
});

// admin button
document.getElementById('adminBtn').addEventListener('click',()=>{
  if(isAdmin){ isAdmin=false; render(); toast('Uitgelogd'); }
  else { openLogin(); }
});

// ══════════════════════════════════════════════
//  MODALS
// ══════════════════════════════════════════════
function openLogin(){
  const lm = document.getElementById('loginModal');
  lm.classList.add('show');
  const pw = document.getElementById('pwInput');
  pw.value='';
  document.getElementById('loginErr').style.display='none';
  pw.focus();
}
document.getElementById('cancelLogin').addEventListener('click',()=>{
  document.getElementById('loginModal').classList.remove('show');
});
document.getElementById('doLogin').addEventListener('click', doLogin);
document.getElementById('pwInput').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
function doLogin(){
  const pw = document.getElementById('pwInput').value;
  if(pw === ADMIN_PASSWORD){
    isAdmin=true;
    document.getElementById('loginModal').classList.remove('show');
    render(); toast('Ingelogd als admin 🔓');
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}

function openAddMatch(){
  const opts=ROUND_DEFS.slice(3).map(r=>`<option value="${r.key}">${r.key} (×${fmt(r.mult)})</option>`).join('');
  $('#sheet').innerHTML=`<h3>Knockout-wedstrijd</h3>
    <div class="field"><label>Ronde</label><select id="f_round">${opts}</select></div>
    <div class="field"><label>Wedstrijd (bv. België - Frankrijk)</label>
      <input id="f_name" placeholder="Thuis - Uit"></div>
    <div class="field"><label>Officiële uitslag (optioneel)</label>
      <div class="mini"><input id="f_rh" type="number" min="0" inputmode="numeric" style="width:54px">
      <span class="dash">-</span>
      <input id="f_ra" type="number" min="0" inputmode="numeric" style="width:54px"></div></div>
    <div class="field"><label>Voorspellingen per speler</label>
      ${DATA.players.map((nm,i)=>`<div class="predform"><span class="pn">${nm}</span>
        <div class="mini"><input class="kh" data-i="${i}" type="number" min="0" inputmode="numeric">
        <span class="dash">-</span>
        <input class="ka" data-i="${i}" type="number" min="0" inputmode="numeric"></div></div>`).join('')}
    </div>
    <div class="actions">
      <button class="btn-ghost" id="cancelAdd">Annuleer</button>
      <button class="btn-primary" id="saveAdd">Toevoegen</button>
    </div>`;
  $('#modal').classList.add('show');
  $('#cancelAdd').onclick=closeModal;
  $('#saveAdd').onclick=()=>{
    const name=$('#f_name').value.trim();
    if(!name||!name.includes('-')){ toast('Geef een wedstrijd op als "Thuis - Uit"'); return; }
    const preds=DATA.players.map((_,i)=>{
      const h=$(`.kh[data-i="${i}"]`).value, a=$(`.ka[data-i="${i}"]`).value;
      return (h!==''&&a!=='')?`${parseInt(h)}-${parseInt(a)}`:'';
    });
    const rh=$('#f_rh').value, ra=$('#f_ra').value;
    if(!state.knockouts) state.knockouts=[];
    state.knockouts.push({round:$('#f_round').value, name, preds,
      result:(rh!==''&&ra!=='')?`${parseInt(rh)}-${parseInt(ra)}`:''});
    saveToFirebase(); closeModal(); ui.tab='matches'; render(); toast('Wedstrijd toegevoegd');
  };
}

function openReset(){
  $('#sheet').innerHTML=`<h3>Uitslagen wissen?</h3>
    <p style="color:var(--muted);font-size:14px;margin:-6px 0 16px">
      Alle ingevulde uitslagen worden gewist voor iedereen.</p>
    <div class="actions">
      <button class="btn-ghost" id="cancelReset">Annuleer</button>
      <button class="btn-primary" id="okReset" style="background:#C0392B">Ja, wissen</button>
    </div>`;
  $('#modal').classList.add('show');
  $('#cancelReset').onclick=closeModal;
  $('#okReset').onclick=()=>{
    state.results={};
    saveToFirebase(); closeModal(); render(); toast('Uitslagen gewist');
  };
}

function closeModal(){ $('#modal').classList.remove('show'); }
$('#modal').addEventListener('click',e=>{ if(e.target.id==='modal') closeModal(); });
document.getElementById('loginModal').addEventListener('click',e=>{
  if(e.target.id==='loginModal') document.getElementById('loginModal').classList.remove('show');
});

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
(async function(){
  await loadFromFirebase();
  render();
})();
</script>
